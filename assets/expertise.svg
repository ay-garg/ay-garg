<svg width="900" height="420" viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0015"/>
      <stop offset="100%" stop-color="#001a2c"/>
    </linearGradient>
    <radialGradient id="b1" cx="15%" cy="22%" r="45%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="b2" cx="85%" cy="78%" r="40%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
    <filter id="blobBlur"><feGaussianBlur stdDeviation="28"/></filter>

    <!-- Hand-drawn wobble on connector lines -->
    <filter id="sketchy" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="turbulence" baseFrequency="0.035" numOctaves="3" seed="5" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.8" xChannelSelector="R" yChannelSelector="G"/>
    </filter>

    <linearGradient id="centerG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(124,58,237,0.3)"/>
      <stop offset="100%" stop-color="rgba(236,72,153,0.18)"/>
    </linearGradient>
    <linearGradient id="purpleG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(124,58,237,0.22)"/>
      <stop offset="100%" stop-color="rgba(124,58,237,0.08)"/>
    </linearGradient>
    <linearGradient id="cyanG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(6,182,212,0.22)"/>
      <stop offset="100%" stop-color="rgba(6,182,212,0.08)"/>
    </linearGradient>
    <linearGradient id="pinkG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(236,72,153,0.22)"/>
      <stop offset="100%" stop-color="rgba(236,72,153,0.08)"/>
    </linearGradient>

    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.05)"/>
    </pattern>

    <marker id="ap" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0.5 L0,6.5 L7,3.5 z" fill="rgba(124,58,237,0.75)"/>
    </marker>
    <marker id="ac" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0.5 L0,6.5 L7,3.5 z" fill="rgba(6,182,212,0.75)"/>
    </marker>
    <marker id="ak" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0.5 L0,6.5 L7,3.5 z" fill="rgba(236,72,153,0.75)"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" fill="url(#bg)"/>
  <rect width="900" height="420" fill="url(#dots)"/>
  <ellipse cx="130" cy="110" rx="200" ry="160" fill="url(#b1)" filter="url(#blobBlur)"/>
  <ellipse cx="770" cy="330" rx="200" ry="160" fill="url(#b2)" filter="url(#blobBlur)"/>

  <!-- Connector lines (hand-drawn wobble) -->
  <g filter="url(#sketchy)">
    <line x1="365" y1="167" x2="275" y2="114" stroke="rgba(124,58,237,0.6)" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#ap)"/>
    <line x1="535" y1="167" x2="625" y2="114" stroke="rgba(124,58,237,0.6)" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#ap)"/>
    <line x1="340" y1="207" x2="222" y2="220" stroke="rgba(6,182,212,0.6)" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#ac)"/>
    <line x1="560" y1="207" x2="678" y2="220" stroke="rgba(6,182,212,0.6)" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#ac)"/>
    <line x1="375" y1="244" x2="285" y2="295" stroke="rgba(236,72,153,0.6)" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#ak)"/>
    <line x1="525" y1="244" x2="615" y2="295" stroke="rgba(236,72,153,0.6)" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#ak)"/>
    <!-- Networking sub-connectors -->
    <line x1="205" y1="349" x2="140" y2="366" stroke="rgba(236,72,153,0.38)" stroke-width="1.2" stroke-dasharray="3,3" marker-end="url(#ak)"/>
    <line x1="258" y1="349" x2="272" y2="366" stroke="rgba(236,72,153,0.38)" stroke-width="1.2" stroke-dasharray="3,3" marker-end="url(#ak)"/>
    <!-- GitOps sub-connectors -->
    <line x1="643" y1="349" x2="638" y2="366" stroke="rgba(236,72,153,0.38)" stroke-width="1.2" stroke-dasharray="3,3" marker-end="url(#ak)"/>
    <line x1="697" y1="349" x2="752" y2="366" stroke="rgba(236,72,153,0.38)" stroke-width="1.2" stroke-dasharray="3,3" marker-end="url(#ak)"/>
  </g>

  <!-- CENTER NODE -->
  <rect x="340" y="157" width="220" height="96" rx="18" fill="url(#centerG)" stroke="rgba(167,139,250,0.68)" stroke-width="1.6"/>
  <rect x="342" y="159" width="216" height="44" rx="18" fill="rgba(255,255,255,0.07)"/>
  <text x="450" y="194" font-family="system-ui,-apple-system,sans-serif" font-size="17" font-weight="800" fill="white" text-anchor="middle">Senior
SRE</text>
  <text x="450" y="215" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)" text-anchor="middle" 
letter-spacing="3">RED HAT  ·  OPENSHIFT</text>
  <text x="450" y="239" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="rgba(167,139,250,0.65)" text-anchor="middle" 
letter-spacing="2">PREV: PRINCIPAL ENGINEER</text>

  <!-- TOP-LEFT: OpenShift 4 -->
  <rect x="163" y="65" width="152" height="54" rx="13" fill="url(#purpleG)" stroke="rgba(124,58,237,0.62)" stroke-width="1.3"/>
  <rect x="165" y="67" width="148" height="24" rx="13" fill="rgba(255,255,255,0.07)"/>
  <text x="239" y="87" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">OpenShift
4</text>
  <text x="239" y="108" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="rgba(255,255,255,0.44)" text-anchor="middle">Cluster
Management</text>

  <!-- TOP-RIGHT: Kubernetes -->
  <rect x="585" y="65" width="152" height="54" rx="13" fill="url(#purpleG)" stroke="rgba(124,58,237,0.62)" stroke-width="1.3"/>
  <rect x="587" y="67" width="148" height="24" rx="13" fill="rgba(255,255,255,0.07)"/>
  <text x="661" y="87" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white" 
text-anchor="middle">Kubernetes</text>
  <text x="661" y="108" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="rgba(255,255,255,0.44)" 
text-anchor="middle">Orchestration</text>

  <!-- LEFT: AWS / OCI -->
  <rect x="80" y="196" width="142" height="54" rx="13" fill="url(#cyanG)" stroke="rgba(6,182,212,0.62)" stroke-width="1.3"/>
  <rect x="82" y="198" width="138" height="24" rx="13" fill="rgba(255,255,255,0.07)"/>
  <text x="151" y="218" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">AWS /
OCI</text>
  <text x="151" y="239" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="rgba(255,255,255,0.44)" text-anchor="middle">Multi-Cloud
Infra</text>

  <!-- RIGHT: Terraform -->
  <rect x="678" y="196" width="142" height="54" rx="13" fill="url(#cyanG)" stroke="rgba(6,182,212,0.62)" stroke-width="1.3"/>
  <rect x="680" y="198" width="138" height="24" rx="13" fill="rgba(255,255,255,0.07)"/>
  <text x="749" y="218" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white" 
text-anchor="middle">Terraform</text>
  <text x="749" y="239" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="rgba(255,255,255,0.44)" text-anchor="middle">IaC
Provisioning</text>

  <!-- BOTTOM-LEFT: Networking -->
  <rect x="163" y="295" width="152" height="54" rx="13" fill="url(#pinkG)" stroke="rgba(236,72,153,0.62)" stroke-width="1.3"/>
  <rect x="165" y="297" width="148" height="24" rx="13" fill="rgba(255,255,255,0.07)"/>
  <text x="239" y="317" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white" 
text-anchor="middle">Networking</text>
  <text x="239" y="338" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="rgba(255,255,255,0.44)" text-anchor="middle">OVN · DNS ·
Ingress</text>

  <!-- BOTTOM-RIGHT: GitOps -->
  <rect x="585" y="295" width="152" height="54" rx="13" fill="url(#pinkG)" stroke="rgba(236,72,153,0.62)" stroke-width="1.3"/>
  <rect x="587" y="297" width="148" height="24" rx="13" fill="rgba(255,255,255,0.07)"/>
  <text x="661" y="317" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">GitOps /
CI-CD</text>
  <text x="661" y="338" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="rgba(255,255,255,0.44)" text-anchor="middle">ArgoCD ·
Tekton</text>

  <!-- Networking sub-pills -->
  <rect x="78"  y="366" width="116" height="28" rx="9" fill="rgba(236,72,153,0.11)" stroke="rgba(236,72,153,0.42)" stroke-width="1"/>
  <text x="136" y="384" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="rgba(255,255,255,0.68)" 
text-anchor="middle">OVN-Kubernetes</text>

  <rect x="207" y="366" width="108" height="28" rx="9" fill="rgba(236,72,153,0.11)" stroke="rgba(236,72,153,0.42)" stroke-width="1"/>
  <text x="261" y="384" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="rgba(255,255,255,0.68)" text-anchor="middle">Service
Mesh 3</text>

  <!-- GitOps sub-pills -->
  <rect x="598" y="366" width="80" height="28" rx="9" fill="rgba(236,72,153,0.11)" stroke="rgba(236,72,153,0.42)" stroke-width="1"/>
  <text x="638" y="384" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="rgba(255,255,255,0.68)" 
text-anchor="middle">ArgoCD</text>

  <rect x="692" y="366" width="80" height="28" rx="9" fill="rgba(236,72,153,0.11)" stroke="rgba(236,72,153,0.42)" stroke-width="1"/>
  <text x="732" y="384" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="rgba(255,255,255,0.68)" 
text-anchor="middle">Tekton</text>
</svg>
