<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0015"/>
      <stop offset="50%" stop-color="#130028"/>
      <stop offset="100%" stop-color="#001a2c"/>
    </linearGradient>
    <radialGradient id="b1" cx="20%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="b2" cx="82%" cy="72%" r="45%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="b3" cx="58%" cy="8%" r="38%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="32"/>
    </filter>
    <linearGradient id="cardBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.28)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.04)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.18)"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.13)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.055)"/>
    </pattern>
  </defs>

  <!-- Base background -->
  <rect width="900" height="300" fill="url(#bg)"/>
  <!-- Dot texture -->
  <rect width="900" height="300" fill="url(#dots)"/>

  <!-- Liquid blobs -->
  <ellipse cx="155" cy="115" rx="230" ry="190" fill="url(#b1)" filter="url(#blur)"/>
  <ellipse cx="760" cy="210" rx="250" ry="175" fill="url(#b2)" filter="url(#blur)"/>
  <ellipse cx="510" cy="35"  rx="190" ry="140" fill="url(#b3)" filter="url(#blur)"/>

  <!-- Glass card body -->
  <rect x="48" y="52" width="804" height="196" rx="22"
        fill="rgba(255,255,255,0.042)"
        stroke="url(#cardBorder)"
        stroke-width="1.3"/>
  <!-- Top-glare shine -->
  <rect x="50" y="54" width="800" height="88" rx="22"
        fill="url(#shine)" opacity="0.55"/>

  <!-- Traffic-light dots (top-left of card) -->
  <circle cx="88"  cy="90" r="4" fill="#ff5f57" opacity="0.85"/>
  <circle cx="104" cy="90" r="4" fill="#febc2e" opacity="0.85"/>
  <circle cx="120" cy="90" r="4" fill="#28c840" opacity="0.85"/>

  <!-- Name -->
  <text x="450" y="170"
        font-family="system-ui,-apple-system,'Segoe UI',sans-serif"
        font-size="54" font-weight="800"
        fill="white" text-anchor="middle" letter-spacing="-2">Ayush Garg</text>

  <!-- Role -->
  <text x="450" y="204"
        font-family="system-ui,-apple-system,'Segoe UI',sans-serif"
        font-size="13" font-weight="400"
        fill="rgba(255,255,255,0.52)"
        text-anchor="middle" letter-spacing="5">SENIOR SRE  ·  RED HAT  ·  OPENSHIFT</text>

  <!-- Thin rule -->
  <rect x="370" y="218" width="160" height="0.8" rx="1" fill="rgba(255,255,255,0.12)"/>

  <!-- Tagline -->
  <text x="450" y="234"
        font-family="system-ui,-apple-system,'Segoe UI',sans-serif"
        font-size="11" fill="rgba(255,255,255,0.28)"
        text-anchor="middle" letter-spacing="3">ART OF EXPLOITATION  ·  BLACKHATINSIDE.COM</text>
</svg>
